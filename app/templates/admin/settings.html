{% extends "base.html" %}
{% block title %}Admin Settings - LMS{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body">
    <h1 class="h4 mb-3"><i class="fa-solid fa-gear me-2 text-primary"></i>System Settings</h1>
    <p class="text-muted">Save configurable LMS values (for example loan period and fine rate).</p>

    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <button class="btn btn-outline-primary w-100 js-preset" data-key="loan_period_days" data-value="14">Preset: Loan Period 14 days</button>
      </div>
      <div class="col-md-6">
        <button class="btn btn-outline-primary w-100 js-preset" data-key="fine_rate_per_day" data-value="1.0">Preset: Fine Rate 1.0/day</button>
      </div>
    </div>

    <form method="post" action="{{ url_for('admin.settings') }}" class="js-disable-on-submit">
      <div class="mb-3">
        <label class="form-label" for="settingKey">Setting Key</label>
        <input id="settingKey" class="form-control" name="key" required placeholder="e.g., loan_period_days">
      </div>
      <div class="mb-3">
        <label class="form-label" for="settingValue">Setting Value</label>
        <input id="settingValue" class="form-control" name="value" required placeholder="e.g., 14">
      </div>
      <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk me-1"></i>Save Setting</button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.querySelectorAll(".js-preset").forEach(function (btn) {
    btn.addEventListener("click", function () {
      document.getElementById("settingKey").value = btn.dataset.key || "";
      document.getElementById("settingValue").value = btn.dataset.value || "";
    });
  });
</script>
{% endblock %}
