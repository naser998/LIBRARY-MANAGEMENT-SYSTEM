{% extends "base.html" %}
{% block title %}Login - LMS{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:70vh;">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <i class="fa-solid fa-book-open-reader fa-2xl text-primary"></i>
          <h1 class="h4 mt-3 mb-1">Welcome Back</h1>
          <p class="text-muted mb-0">Sign in with your LMS account</p>
        </div>
        <form method="post" action="{{ url_for('auth.login') }}" class="js-disable-on-submit">
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" id="username" name="username" required value="{{ username or '' }}" autocomplete="username">
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2"><i class="fa-solid fa-right-to-bracket me-1"></i>Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
